# Resource group name matches tfstate.ps1 ($RESOURCE_GROUP_NAME = 'tfstate').
name: AzureLogin

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: Azure subscription ID to use after login
        required: true
        type: string
      aks_cluster_name:
        description: AKS cluster name in the tfstate resource group
        required: true
        type: string

permissions:
  contents: read

env:
  RESOURCE_GROUP_NAME: tfstate

jobs:
  azure-login:
    name: Azure login and AKS kubeconfig
    runs-on: ubuntu-latest
    steps:
      - name: Azure CLI login (service principal)
        run: |
          az login --service-principal \
            -u "$ARM_CLIENT_ID" \
            -p "$ARM_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID"
          az account set --subscription "$SUBSCRIPTION_ID"
          az account show --output table
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          SUBSCRIPTION_ID: ${{ inputs.subscription_id }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$RESOURCE_GROUP_NAME" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing
          kubectl config current-context
          kubectl get nodes -o wide
        env:
          AKS_CLUSTER_NAME: ${{ inputs.aks_cluster_name }}
