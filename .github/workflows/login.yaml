# Managed identity on an Azure VM self-hosted runner (no client secret).
# https://github.com/Azure/login#login-with-system-assigned-managed-identity

name: AzureLogin

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: Azure subscription ID to use after login
        required: true
        type: string
      user_assigned_client_id:
        description: Client ID of user-assigned managed identity on the runner VM (leave empty for system-assigned MI)
        required: false
        type: string

permissions:
  contents: read

jobs:
  azure-login:
    name: Azure login
    runs-on: self-hosted
    steps:
      - uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ inputs.subscription_id }}
          client-id: ${{ inputs.user_assigned_client_id }}

      - name: Show subscription
        run: az account show --output table
